<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Student Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;500;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet" />
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0e0f14;
    --surface: #16181f;
    --surface2: #1d2030;
    --border: rgba(255,255,255,0.07);
    --border2: rgba(255,255,255,0.13);
    --text: #f0f1f5;
    --muted: #8b8fa8;
    --accent: #5c6ef8;
    --accent2: #38e5b0;
    --warn: #f5a623;
    --danger: #f06060;
    --success: #38e5b0;
    --font: 'Sora', sans-serif;
    --mono: 'DM Mono', monospace;
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--font);
    min-height: 100vh;
    padding: 2rem;
  }

  /* ── Header ── */
  .header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 2.5rem;
    flex-wrap: wrap;
    gap: 1rem;
  }
  .header-left h1 {
    font-size: 1.5rem;
    font-weight: 700;
    letter-spacing: -0.02em;
  }
  .header-left p {
    font-size: 0.8rem;
    color: var(--muted);
    margin-top: 4px;
  }
  .sheet-config {
    display: flex;
    align-items: center;
    gap: 10px;
    flex-wrap: wrap;
  }
  .sheet-config input {
    background: var(--surface2);
    border: 1px solid var(--border2);
    border-radius: 8px;
    padding: 8px 14px;
    color: var(--text);
    font-family: var(--mono);
    font-size: 0.72rem;
    width: 340px;
    outline: none;
    transition: border-color 0.2s;
  }
  .sheet-config input:focus { border-color: var(--accent); }
  .sheet-config input::placeholder { color: var(--muted); }
  .btn-load {
    background: var(--accent);
    color: #fff;
    border: none;
    border-radius: 8px;
    padding: 9px 20px;
    font-family: var(--font);
    font-size: 0.78rem;
    font-weight: 600;
    cursor: pointer;
    transition: opacity 0.2s, transform 0.1s;
    white-space: nowrap;
  }
  .btn-load:hover { opacity: 0.88; }
  .btn-load:active { transform: scale(0.97); }
  .btn-load:disabled { opacity: 0.45; cursor: default; }

  /* ── Stats Cards ── */
  .stats-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
    gap: 14px;
    margin-bottom: 2rem;
  }
  .stat-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 1.25rem 1.4rem;
    position: relative;
    overflow: hidden;
  }
  .stat-card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 2px;
    background: var(--accent-line, var(--accent));
    border-radius: 14px 14px 0 0;
  }
  .stat-card .label {
    font-size: 0.72rem;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.07em;
    margin-bottom: 10px;
  }
  .stat-card .value {
    font-size: 2rem;
    font-weight: 700;
    letter-spacing: -0.03em;
    line-height: 1;
  }
  .stat-card .sub {
    font-size: 0.72rem;
    color: var(--muted);
    margin-top: 6px;
  }

  /* ── Controls ── */
  .controls {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 1.2rem;
    flex-wrap: wrap;
  }
  .search-wrap {
    position: relative;
    flex: 1;
    min-width: 200px;
  }
  .search-wrap svg {
    position: absolute;
    left: 12px;
    top: 50%;
    transform: translateY(-50%);
    color: var(--muted);
    pointer-events: none;
  }
  .search-wrap input {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 9px 12px 9px 36px;
    color: var(--text);
    font-family: var(--font);
    font-size: 0.82rem;
    width: 100%;
    outline: none;
    transition: border-color 0.2s;
  }
  .search-wrap input:focus { border-color: var(--accent); }
  .search-wrap input::placeholder { color: var(--muted); }
  .filter-select {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 9px 14px;
    color: var(--text);
    font-family: var(--font);
    font-size: 0.82rem;
    outline: none;
    cursor: pointer;
    transition: border-color 0.2s;
  }
  .filter-select:focus { border-color: var(--accent); }
  .count-label { font-size: 0.78rem; color: var(--muted); margin-left: auto; }

  /* ── Table ── */
  .table-wrap {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 14px;
    overflow: hidden;
  }
  table {
    width: 100%;
    border-collapse: collapse;
    font-size: 0.83rem;
    table-layout: fixed;
  }
  thead tr { background: var(--surface2); }
  th {
    padding: 13px 16px;
    text-align: left;
    font-size: 0.7rem;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.07em;
    color: var(--muted);
    cursor: pointer;
    user-select: none;
    border-bottom: 1px solid var(--border);
    white-space: nowrap;
  }
  th:hover { color: var(--text); }
  th .sort-icon { margin-left: 4px; opacity: 0.4; font-size: 10px; }
  th.active .sort-icon { opacity: 1; color: var(--accent); }
  th:nth-child(1) { width: 5%; }
  th:nth-child(2) { width: 28%; }
  th:nth-child(3) { width: 22%; }
  th:nth-child(4) { width: 16%; }
  th:nth-child(5) { width: 18%; }

  tbody tr {
    border-bottom: 1px solid var(--border);
    transition: background 0.15s;
  }
  tbody tr:last-child { border-bottom: none; }
  tbody tr:hover { background: var(--surface2); }
  td {
    padding: 13px 16px;
    color: var(--text);
    vertical-align: middle;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }
  td.no-col { color: var(--muted); font-size: 0.75rem; font-family: var(--mono); }

  .name-cell {
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .avatar {
    width: 30px; height: 30px;
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 0.7rem; font-weight: 700;
    flex-shrink: 0;
  }

  /* Progress Bar */
  .progress-wrap { display: flex; align-items: center; gap: 10px; }
  .progress-bar-bg {
    flex: 1;
    height: 6px;
    background: var(--surface2);
    border-radius: 99px;
    overflow: hidden;
    min-width: 60px;
  }
  .progress-bar-fill {
    height: 100%;
    border-radius: 99px;
    transition: width 0.6s ease;
  }
  .progress-pct { font-size: 0.75rem; color: var(--muted); font-family: var(--mono); min-width: 36px; }

  /* Score Badge */
  .score-badge {
    display: inline-flex;
    align-items: center;
    gap: 5px;
    padding: 4px 12px;
    border-radius: 99px;
    font-family: var(--mono);
    font-size: 0.78rem;
    font-weight: 500;
  }

  /* Portfolio Badge */
  .portfolio-badge {
    display: inline-flex;
    align-items: center;
    gap: 5px;
    padding: 5px 14px;
    border-radius: 8px;
    font-size: 0.74rem;
    font-weight: 600;
    letter-spacing: 0.04em;
  }
  .badge-approved {
    background: rgba(56, 229, 176, 0.12);
    color: var(--success);
    border: 1px solid rgba(56, 229, 176, 0.25);
  }
  .badge-pending {
    background: rgba(245, 166, 35, 0.12);
    color: var(--warn);
    border: 1px solid rgba(245, 166, 35, 0.25);
  }

  /* Empty / Loading / Error states */
  .state-row td {
    text-align: center;
    padding: 4rem 1rem;
    color: var(--muted);
  }
  .state-icon { font-size: 2rem; margin-bottom: 12px; }
  .state-text { font-size: 0.85rem; }
  .state-sub { font-size: 0.75rem; margin-top: 6px; color: var(--muted); opacity: 0.7; }

  .spinner {
    width: 28px; height: 28px;
    border: 3px solid var(--border);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
    margin: 0 auto 12px;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* How-to hint box */
  .hint-box {
    background: rgba(92, 110, 248, 0.07);
    border: 1px solid rgba(92, 110, 248, 0.2);
    border-radius: 10px;
    padding: 1rem 1.25rem;
    margin-bottom: 1.8rem;
    font-size: 0.78rem;
    color: var(--muted);
    line-height: 1.7;
  }
  .hint-box strong { color: var(--text); }
  .hint-box code {
    background: var(--surface2);
    border-radius: 4px;
    padding: 1px 6px;
    font-family: var(--mono);
    font-size: 0.75rem;
    color: var(--accent2);
  }
  .hint-toggle {
    background: none;
    border: none;
    color: var(--accent);
    font-family: var(--font);
    font-size: 0.78rem;
    cursor: pointer;
    padding: 0;
    margin-bottom: 0.8rem;
    text-decoration: underline;
    text-underline-offset: 2px;
  }

  @media (max-width: 640px) {
    body { padding: 1rem; }
    .sheet-config input { width: 100%; }
    th:nth-child(3), td:nth-child(3) { display: none; }
  }
</style>
</head>
<body>

<!-- Header -->
<div class="header">
  <div class="header-left">
    <h1>Student Dashboard</h1>
  </div>
</div>

<!-- Stats Summary -->
<div class="stats-grid">
  <div class="stat-card" style="--accent-line: var(--accent)">
    <div class="label">Total Siswa</div>
    <div class="value" id="stat-total">—</div>
    <div class="sub">terdaftar</div>
  </div>
  <div class="stat-card" style="--accent-line: var(--accent2)">
    <div class="label">Rata-rata Completion</div>
    <div class="value" id="stat-completion">—</div>
    <div class="sub">dari seluruh siswa</div>
  </div>
  <div class="stat-card" style="--accent-line: var(--warn)">
    <div class="label">Rata-rata Score</div>
    <div class="value" id="stat-score">—</div>
    <div class="sub">nilai rata-rata</div>
  </div>
  <div class="stat-card" style="--accent-line: var(--success)">
    <div class="label">Portfolio Approved</div>
    <div class="value" id="stat-approved">—</div>
    <div class="sub" id="stat-approved-pct">dari total siswa</div>
  </div>
</div>

<!-- Controls -->
<div class="controls">
  <div class="search-wrap">
    <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
      <circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/>
    </svg>
    <input type="text" id="search-input" placeholder="Cari nama siswa..." oninput="renderTable()" />
  </div>
  <select class="filter-select" id="filter-portfolio" onchange="renderTable()">
    <option value="all">Semua Portfolio</option>
    <option value="approved">Approved</option>
    <option value="pending">Pending</option>
  </select>
  <select class="filter-select" id="filter-score" onchange="renderTable()">
    <option value="all">Semua Score</option>
    <option value="high">Score ≥ 80</option>
    <option value="mid">Score 60–79</option>
    <option value="low">Score &lt; 60</option>
  </select>
  <span class="count-label" id="count-label"></span>
</div>

<!-- Table -->
<div class="table-wrap">
  <table>
    <thead>
      <tr>
        <th onclick="sortBy('no')">#<span class="sort-icon" id="sort-no">↕</span></th>
        <th onclick="sortBy('nama')">Nama<span class="sort-icon" id="sort-nama">↕</span></th>
        <th onclick="sortBy('completion')">Completion Rate<span class="sort-icon" id="sort-completion">↕</span></th>
        <th onclick="sortBy('score')">Score<span class="sort-icon" id="sort-score">↕</span></th>
        <th>Approve Portfolio</th>
      </tr>
    </thead>
    <tbody id="table-body">
      <tr class="state-row">
        <td colspan="5">
          <div class="state-icon">📋</div>
          <div class="state-text">Belum ada data</div>
          <div class="state-sub">Masukkan URL Google Sheet CSV dan klik Load Data</div>
        </td>
      </tr>
    </tbody>
  </table>
</div>

<script>
  let allData = [];
  let sortCol = 'nama';
  let sortDir = 1;

  const AVATAR_COLORS = [
    ['#5c6ef8','#c7ceff'],['#38e5b0','#0d3d2e'],['#f5a623','#3d2900'],
    ['#f06060','#3d0000'],['#a78bfa','#2e1a5e'],['#34d399','#064e3b'],
  ];

  function avatarStyle(name) {
    const idx = name.charCodeAt(0) % AVATAR_COLORS.length;
    const [bg, fg] = AVATAR_COLORS[idx];
    return `background:${bg};color:${fg}`;
  }

  function initials(name) {
    return name.trim().split(/\s+/).slice(0,2).map(w=>w[0].toUpperCase()).join('');
  }

  function progressColor(pct) {
    if (pct >= 80) return 'var(--success)';
    if (pct >= 50) return 'var(--warn)';
    return 'var(--danger)';
  }

  function scoreColor(score) {
    if (score >= 80) return { bg:'rgba(56,229,176,0.12)', text:'var(--success)', border:'rgba(56,229,176,0.25)' };
    if (score >= 60) return { bg:'rgba(245,166,35,0.12)',  text:'var(--warn)',    border:'rgba(245,166,35,0.25)' };
    return { bg:'rgba(240,96,96,0.12)', text:'var(--danger)', border:'rgba(240,96,96,0.25)' };
  }

  function parseCSV(text) {
    const lines = text.trim().split('\n');
    if (lines.length < 2) throw new Error('Data kosong atau format tidak valid');
    const headers = lines[0].split(',').map(h => h.trim().replace(/^"|"$/g, ''));

    const colMap = {};
    headers.forEach((h, i) => { colMap[h.toLowerCase()] = i; });

    const namaIdx      = findCol(colMap, ['nama','name']);
    const completionIdx= findCol(colMap, ['completion rate','completion','completionrate']);
    const scoreIdx     = findCol(colMap, ['score','nilai']);
    const portfolioIdx = findCol(colMap, ['approve portfolio','portfolio','approved']);

    if (namaIdx === -1)       throw new Error('Kolom "Nama" tidak ditemukan. Cek nama kolom di Sheet.');
    if (completionIdx === -1) throw new Error('Kolom "Completion Rate" tidak ditemukan.');
    if (scoreIdx === -1)      throw new Error('Kolom "Score" tidak ditemukan.');
    if (portfolioIdx === -1)  throw new Error('Kolom "Approve Portfolio" tidak ditemukan.');

    const rows = [];
    for (let i = 1; i < lines.length; i++) {
      const cols = splitCSVLine(lines[i]);
      const nama = (cols[namaIdx]||'').trim().replace(/^"|"$/g,'');
      if (!nama) continue;
      const completion = parseFloat((cols[completionIdx]||'0').replace('%','')) || 0;
      const score      = parseFloat((cols[scoreIdx]||'0')) || 0;
      const portRaw    = (cols[portfolioIdx]||'').trim().toUpperCase();
      const approved   = portRaw === 'TRUE' || portRaw === '1' || portRaw === 'YA' || portRaw === 'YES';
      rows.push({ nama, completion: Math.min(100, completion), score, approved });
    }
    return rows;
  }

  function findCol(map, candidates) {
    for (const c of candidates) if (map[c] !== undefined) return map[c];
    return -1;
  }

  function splitCSVLine(line) {
    const result = []; let cur = ''; let inQ = false;
    for (let i = 0; i < line.length; i++) {
      const ch = line[i];
      if (ch === '"') { inQ = !inQ; }
      else if (ch === ',' && !inQ) { result.push(cur); cur = ''; }
      else cur += ch;
    }
    result.push(cur);
    return result;
  }

  function updateStats(data) {
    const total = data.length;
    const avgComp = total ? (data.reduce((s,r)=>s+r.completion,0)/total).toFixed(1) : 0;
    const avgScore = total ? (data.reduce((s,r)=>s+r.score,0)/total).toFixed(1) : 0;
    const approvedCount = data.filter(r=>r.approved).length;
    const approvedPct = total ? Math.round(approvedCount/total*100) : 0;

    document.getElementById('stat-total').textContent = total;
    document.getElementById('stat-completion').textContent = total ? avgComp + '%' : '—';
    document.getElementById('stat-score').textContent = total ? avgScore : '—';
    document.getElementById('stat-approved').textContent = total ? approvedCount : '—';
    document.getElementById('stat-approved-pct').textContent = total ? `${approvedPct}% dari total` : 'dari total siswa';
  }

  function renderTable() {
    const q = document.getElementById('search-input').value.toLowerCase();
    const portFilter = document.getElementById('filter-portfolio').value;
    const scoreFilter = document.getElementById('filter-score').value;

    let filtered = allData.filter(r => {
      if (q && !r.nama.toLowerCase().includes(q)) return false;
      if (portFilter === 'approved' && !r.approved) return false;
      if (portFilter === 'pending' && r.approved) return false;
      if (scoreFilter === 'high' && r.score < 80) return false;
      if (scoreFilter === 'mid' && (r.score < 60 || r.score >= 80)) return false;
      if (scoreFilter === 'low' && r.score >= 60) return false;
      return true;
    });

    filtered.sort((a,b) => {
      if (sortCol === 'nama') return a.nama.localeCompare(b.nama) * sortDir;
      if (sortCol === 'completion') return (a.completion - b.completion) * sortDir;
      if (sortCol === 'score') return (a.score - b.score) * sortDir;
      return 0;
    });

    document.getElementById('count-label').textContent =
      filtered.length !== allData.length
        ? `${filtered.length} dari ${allData.length} siswa`
        : `${allData.length} siswa`;

    const tbody = document.getElementById('table-body');
    if (filtered.length === 0) {
      tbody.innerHTML = `<tr class="state-row"><td colspan="5">
        <div class="state-icon">🔍</div>
        <div class="state-text">Tidak ada siswa yang cocok</div>
        <div class="state-sub">Coba ubah filter atau kata kunci pencarian</div>
      </td></tr>`;
      return;
    }

    tbody.innerHTML = filtered.map((r, i) => {
      const sc = scoreColor(r.score);
      return `<tr>
        <td class="no-col">${i+1}</td>
        <td>
          <div class="name-cell">
            <div class="avatar" style="${avatarStyle(r.nama)}">${initials(r.nama)}</div>
            <span>${escHtml(r.nama)}</span>
          </div>
        </td>
        <td>
          <div class="progress-wrap">
            <div class="progress-bar-bg">
              <div class="progress-bar-fill" style="width:${r.completion}%;background:${progressColor(r.completion)}"></div>
            </div>
            <span class="progress-pct">${r.completion.toFixed(0)}%</span>
          </div>
        </td>
        <td>
          <span class="score-badge" style="background:${sc.bg};color:${sc.text};border:1px solid ${sc.border}">
            ${r.score.toFixed(1)}
          </span>
        </td>
        <td>
          <span class="portfolio-badge ${r.approved ? 'badge-approved' : 'badge-pending'}">
            ${r.approved ? '✓ Approved' : '⏳ Pending'}
          </span>
        </td>
      </tr>`;
    }).join('');
  }

  function escHtml(str) {
    return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  function sortBy(col) {
    if (sortCol === col) { sortDir *= -1; }
    else { sortCol = col; sortDir = 1; }
    ['no','nama','completion','score'].forEach(c => {
      document.getElementById('sort-'+c).textContent = c === sortCol ? (sortDir===1?'↑':'↓') : '↕';
      document.getElementById('sort-'+c).parentElement.classList.toggle('active', c===sortCol);
    });
    renderTable();
  }

  async function loadData() {
        // Convert Google Sheets URL to CSV publish URL if needed
    let url = "https://docs.google.com/spreadsheets/d/e/2PACX-1vQQbZg36U6B5uOfVG89XvTkxe89ndJKo0kKUVzEFv-PScIrS8HN3bvlTnXS7Wx2zcaOuyztVrDuls_2/pub?output=csv";
    const sheetMatch = url.match(/\/spreadsheets\/d\/([a-zA-Z0-9-_]+)/);
    if (sheetMatch && !url.includes('output=csv')) {
      const id = sheetMatch[1];
      url = `https://docs.google.com/spreadsheets/d/${id}/pub?output=csv`;
    }

    const btn = document.getElementById('btn-load');
    btn.disabled = true;
    btn.textContent = 'Loading...';

    const tbody = document.getElementById('table-body');
    tbody.innerHTML = `<tr class="state-row"><td colspan="5">
      <div class="spinner"></div>
      <div class="state-text">Mengambil data dari Google Sheet...</div>
    </td></tr>`;

    document.getElementById('last-updated').textContent = 'Sedang memuat data...';

    try {
      // Use CORS proxy for GitHub Pages
      const proxyUrl = `https://api.allorigins.win/raw?url=${encodeURIComponent(url)}`;
      const res = await fetch(proxyUrl);
      if (!res.ok) throw new Error(`HTTP ${res.status}`);
      const text = await res.text();
      if (text.includes('<!DOCTYPE') || text.includes('<html')) throw new Error('Sheet belum dipublish atau URL salah.');

      allData = parseCSV(text);
      updateStats(allData);
      renderTable();

      const now = new Date().toLocaleString('id-ID', { dateStyle:'medium', timeStyle:'short' });
      document.getElementById('last-updated').textContent = `Terakhir diperbarui: ${now} • ${allData.length} siswa`;
    } catch (err) {
      allData = [];
      updateStats([]);
      tbody.innerHTML = `<tr class="state-row"><td colspan="5">
        <div class="state-icon">⚠️</div>
        <div class="state-text">Gagal memuat data</div>
        <div class="state-sub">${escHtml(err.message)}</div>
      </td></tr>`;
      document.getElementById('last-updated').textContent = 'Gagal memuat — periksa URL dan pastikan Sheet sudah dipublish';
    } finally {
      btn.disabled = false;
      btn.textContent = 'Load Data';
    }
  }

  function toggleHint() {
    const el = document.getElementById('hint-box');
    const btn = document.querySelector('.hint-toggle');
    const show = el.style.display === 'none';
    el.style.display = show ? 'block' : 'none';
    btn.textContent = (show ? '▾' : '▸') + ' Cara mendapatkan URL CSV Google Sheet';
  }

  // Allow Enter key to trigger load
  loadData();
</script>
</body>
</html>
